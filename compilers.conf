# =============================================================================
# compilers.conf — Compiler definitions for build_mpi_stack.sh
#
# Format per entry (blank lines and lines starting with # are ignored):
#
#   [compiler_id]
#   family   = gcc | aocc | intel
#   version  = <version string passed to --compiler-version>
#   modules  = <space-separated list of modules to load in order>
#   cc       = <C compiler binary name>
#   cxx      = <C++ compiler binary name>
#   fc       = <Fortran compiler binary name>
#
# The compiler_id is what you pass to --compiler-version on the command line,
# e.g.: --compiler=gcc --compiler-version=15.2.0
#
# modules are loaded left-to-right via `module load`. Put prerequisite/parent
# modules (e.g. gcc-compilers, amd-compilers, intel-compilers) before the
# versioned compiler module.
#
# cc/cxx/fc are the binary names looked up via `command -v` after modules load.
# =============================================================================

# -----------------------------------------------------------------------------
# AOCC (AMD LLVM-based)
# -----------------------------------------------------------------------------
[aocc/5.0.0]
family   = aocc
version  = 5.0.0
modules  = amd-compilers aocc/5.0.0
cc       = clang
cxx      = clang++
fc       = flang

[aocc/5.1.0]
family   = aocc
version  = 5.1.0
modules  = amd-compilers aocc/5.1.0
cc       = clang
cxx      = clang++
fc       = flang

# -----------------------------------------------------------------------------
# GCC
# -----------------------------------------------------------------------------
[gcc/12.5.0]
family   = gcc
version  = 12.5.0
modules  = gcc-compilers gcc/12.5.0
cc       = gcc
cxx      = g++
fc       = gfortran

[gcc/13.3.0]
family   = gcc
version  = 13.3.0
modules  = gcc-compilers gcc/13.3.0
cc       = gcc
cxx      = g++
fc       = gfortran

[gcc/14.2.0]
family   = gcc
version  = 14.2.0
modules  = gcc-compilers gcc/14.2.0
cc       = gcc
cxx      = g++
fc       = gfortran

[gcc/14.3.0]
family   = gcc
version  = 14.3.0
modules  = gcc-compilers gcc/14.3.0
cc       = gcc
cxx      = g++
fc       = gfortran

[gcc/15.1.0]
family   = gcc
version  = 15.1.0
modules  = gcc-compilers gcc/15.1.0
cc       = gcc
cxx      = g++
fc       = gfortran

[gcc/15.2.0]
family   = gcc
version  = 15.2.0
modules  = gcc-compilers gcc/15.2.0
cc       = gcc
cxx      = g++
fc       = gfortran

# -----------------------------------------------------------------------------
# Intel Classic (icc) — legacy, C/C++ only; Fortran via ifort
# -----------------------------------------------------------------------------
[icc/2023.2.0]
family   = intel
version  = 2023.2.0
modules  = intel-compilers icc/2023.2.0
cc       = icc
cxx      = icpc
fc       = ifort

# -----------------------------------------------------------------------------
# Intel oneAPI (icx/ifx) — current, recommended
# -----------------------------------------------------------------------------
[icx/2024.2.1]
family   = intel
version  = 2024.2.1
modules  = intel-compilers icx/2024.2.1
cc       = icx
cxx      = icpx
fc       = ifx

[icx/2025.1.0]
family   = intel
version  = 2025.1.0
modules  = intel-compilers icx/2025.1.0
cc       = icx
cxx      = icpx
fc       = ifx

[icx/2025.2.1]
family   = intel
version  = 2025.2.1
modules  = intel-compilers icx/2025.2.1
cc       = icx
cxx      = icpx
fc       = ifx

[icx/2025.3.2]
family   = intel
version  = 2025.3.2
modules  = intel-compilers icx/2025.3.2
cc       = icx
cxx      = icpx
fc       = ifx
